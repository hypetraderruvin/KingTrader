<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V12.3 PRO - Live Signal Feed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a12 0%, #151525 50%, #0f1623 100%);
            min-height: 100vh;
            color: #fff;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Header */
        .header {
            background: linear-gradient(145deg, #1e1e3f 0%, #2d2d5a 100%);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.1), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .header-emoji {
            font-size: 36px;
            margin-bottom: 8px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .header-title {
            font-size: 20px;
            font-weight: 800;
            color: #ffd700;
            letter-spacing: 1px;
        }

        .header-pair {
            font-size: 24px;
            color: #64b5f6;
            font-weight: 900;
            margin: 8px 0;
            font-family: 'Consolas', monospace;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            color: #00ff88;
            margin-top: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 12px #00ff88;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.8); }
        }

        /* Connection Info */
        .connection-info {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 16px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            border: 1px solid rgba(100, 100, 150, 0.2);
        }

        .connection-left {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8892b0;
        }

        .connection-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .api-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .api-connected {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .api-disconnected {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }

        .last-update {
            color: #ffd700;
            font-weight: 600;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            flex: 1;
            border: 1px solid rgba(100, 100, 150, 0.2);
        }

        .stat-label {
            font-size: 10px;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 800;
            color: #ffd700;
            margin-top: 4px;
        }

        /* Signal Feed */
        .signal-feed {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .signal-card {
            background: linear-gradient(145deg, #1a1a35 0%, #252550 100%);
            border-radius: 16px;
            border: 1px solid rgba(100, 100, 150, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideIn 0.4s ease-out;
            transition: transform 0.2s ease;
        }

        .signal-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.2);
        }

        .card-emoji {
            font-size: 22px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.5px;
            flex: 1;
        }

        .card-time {
            font-size: 11px;
            color: #8892b0;
            font-family: 'Consolas', monospace;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, rgba(100, 100, 150, 0.6) 15%, rgba(100, 100, 150, 0.6) 85%, transparent 100%);
            margin: 0 18px;
        }

        .card-body {
            padding: 14px 18px;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Signal Type Colors */
        .signal-new { border-left: 4px solid #ffd700; }
        .signal-entry { border-left: 4px solid #00ff88; }
        .signal-win { 
            border-left: 4px solid #00ff88; 
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.15);
        }
        .signal-loss { 
            border-left: 4px solid #ff4757; 
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.15);
        }
        .signal-refund { border-left: 4px solid #ffd700; }
        .signal-martingale { 
            border-left: 4px solid #ff6b6b; 
            border: 2px solid rgba(255, 107, 107, 0.3);
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: #8892b0;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 215, 0, 0.3);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8892b0;
        }

        .refresh-btn {
            background: linear-gradient(145deg, #2d2d5a 0%, #1e1e3f 100%);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #ffd700;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: linear-gradient(145deg, #3d3d7a 0%, #2e2e5f 100%);
            transform: translateY(-1px);
        }

        /* Error State */
        .error-state {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: #ff4757;
        }

        .error-state button {
            margin-top: 10px;
            background: #ff4757;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a12;
        }

        ::-webkit-scrollbar-thumb {
            background: #2d2d5a;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Header -->
        <div class="header">
            <div class="header-emoji">🚀</div>
            <div class="header-title">V12.3 PRO SIGNAL FEED</div>
            <div class="header-pair" id="currentPair">EUR/USD</div>
            <div class="status-bar">
                <span class="status-dot"></span>
                <span>LIVE TELEGRAM FEED</span>
            </div>
        </div>

        <!-- Connection Info -->
        <div class="connection-info">
            <div class="connection-left">
                <span>📡</span>
                <span id="connectionText">Connecting...</span>
            </div>
            <div class="connection-right">
                <span class="api-status api-disconnected" id="apiStatus">● Offline</span>
                <span class="last-update" id="lastUpdate">--:--</span>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-box">
                <div class="stat-label">Total Signals</div>
                <div class="stat-value" id="totalSignals">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Last Update</div>
                <div class="stat-value" id="lastUpdateTime" style="font-size: 14px;">-</div>
            </div>
        </div>

        <!-- Signal Feed -->
        <div class="signal-feed" id="signalFeed">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>Connecting to signal feed...</div>
            </div>
        </div>

    </div>

    <script>
        // ===== CONFIGURATION =====
        // URL to your signals.json file in GitHub
        const SIGNALS_URL = 'https://raw.githubusercontent.com/hypetraderruvin/KingTrader/main/signals.json';

        // Refresh interval (10 seconds)
        const REFRESH_INTERVAL = 10000;

        // ===== STATE =====
        let lastSignals = [];
        let isFirstLoad = true;

        // ===== PARSE SIGNAL TYPE =====
        function parseSignalType(text) {
            if (!text) return { type: 'signal-new', title: '📊 SIGNAL', emoji: '📊' };

            if (text.includes('🎯 NEW SIGNAL')) {
                return { type: 'signal-new', title: '🎯 NEW SIGNAL', emoji: '🎯' };
            } else if (text.includes('🚀 ENTRY')) {
                return { type: 'signal-entry', title: '🚀 ENTRY EXECUTED', emoji: '🚀' };
            } else if (text.includes('✅ RESULT') || text.includes('PROFIT')) {
                return { type: 'signal-win', title: '✅ RESULT - WIN', emoji: '✅' };
            } else if (text.includes('❌ RESULT') || text.includes('LOSS')) {
                return { type: 'signal-loss', title: '❌ RESULT - LOSS', emoji: '❌' };
            } else if (text.includes('🔄 RESULT') || text.includes('REFUND')) {
                return { type: 'signal-refund', title: '🔄 RESULT - REFUND', emoji: '🔄' };
            } else if (text.includes('⚠️ MARTINGALE')) {
                return { type: 'signal-martingale', title: '⚠️ MARTINGALE', emoji: '⚠️' };
            }

            return { type: 'signal-new', title: '📊 SIGNAL', emoji: '📊' };
        }

        // ===== EXTRACT PAIR =====
        function extractPair(text) {
            if (!text) return 'EUR/USD';
            const match = text.match(/([A-Z]{3}\/[A-Z]{3})/);
            return match ? match[1] : 'EUR/USD';
        }

        // ===== RENDER SIGNAL CARD =====
        function renderSignalCard(signal) {
            const parsed = parseSignalType(signal.text);
            const pair = extractPair(signal.text);

            // Format time
            let timeStr = signal.date_formatted || 'Unknown';
            if (signal.date) {
                const date = new Date(signal.date * 1000);
                timeStr = date.toLocaleTimeString('en-US', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    hour12: false 
                }) + ' IST';
            }

            const card = document.createElement('div');
            card.className = `signal-card ${parsed.type}`;

            card.innerHTML = `
                <div class="card-header">
                    <span class="card-emoji">${parsed.emoji}</span>
                    <span class="card-title">${parsed.title}</span>
                    <span class="card-time">${timeStr}</span>
                </div>
                <div class="divider"></div>
                <div class="card-body">${escapeHtml(signal.text)}</div>
            `;

            return card;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== FETCH SIGNALS =====
        async function fetchSignals() {
            try {
                // Add cache-buster to get fresh data
                const url = SIGNALS_URL + '?t=' + Date.now();
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                // Update UI
                updateUI(data);

                // Check if new signals arrived
                if (data.signals && data.signals.length > 0) {
                    const currentIds = data.signals.map(s => s.id).join(',');
                    const lastIds = lastSignals.map(s => s.id).join(',');

                    if (currentIds !== lastIds) {
                        // New signals detected!
                        if (!isFirstLoad) {
                            playNotificationSound();
                        }
                        lastSignals = data.signals;
                    }
                }

                isFirstLoad = false;

            } catch (error) {
                console.error('Fetch error:', error);
                showError(error.message);
            }
        }

        // ===== UPDATE UI =====
        function updateUI(data) {
            const feed = document.getElementById('signalFeed');

            // Update connection status
            document.getElementById('apiStatus').textContent = '● Online';
            document.getElementById('apiStatus').className = 'api-status api-connected';
            document.getElementById('connectionText').textContent = 'Telegram Connected';

            // Update stats
            const total = data.total_signals || (data.signals ? data.signals.length : 0);
            document.getElementById('totalSignals').textContent = total;

            const lastUpdate = data.last_update_readable || new Date().toLocaleTimeString();
            document.getElementById('lastUpdate').textContent = lastUpdate;
            document.getElementById('lastUpdateTime').textContent = lastUpdate.split(' ')[1] || lastUpdate;

            // Update pair display
            if (data.signals && data.signals.length > 0) {
                const latestPair = extractPair(data.signals[data.signals.length - 1].text);
                document.getElementById('currentPair').textContent = latestPair;
            }

            // Render signals (newest first)
            if (data.signals && data.signals.length > 0) {
                feed.innerHTML = '';

                // Show newest first
                const sorted = [...data.signals].reverse();

                sorted.forEach(signal => {
                    const card = renderSignalCard(signal);
                    feed.appendChild(card);
                });
            } else {
                showEmpty();
            }
        }

        // ===== SHOW ERROR =====
        function showError(message) {
            const feed = document.getElementById('signalFeed');

            document.getElementById('apiStatus').textContent = '● Error';
            document.getElementById('apiStatus').className = 'api-status api-disconnected';
            document.getElementById('connectionText').textContent = 'Connection Failed';

            // Don't overwrite existing signals on error, just show warning
            if (feed.querySelector('.loading')) {
                feed.innerHTML = `
                    <div class="error-state">
                        <div>⚠️ Cannot load signals</div>
                        <div style="font-size: 12px; margin-top: 8px; opacity: 0.8;">${message}</div>
                        <button onclick="fetchSignals()">Retry</button>
                    </div>
                `;
            }
        }

        // ===== SHOW EMPTY =====
        function showEmpty() {
            const feed = document.getElementById('signalFeed');
            feed.innerHTML = `
                <div class="empty-state">
                    <div style="font-size: 40px; margin-bottom: 15px;">📭</div>
                    <div>No signals yet</div>
                    <div style="font-size: 12px; margin-top: 10px; opacity: 0.7;">
                        Waiting for Telegram messages...
                    </div>
                </div>
            `;
        }

        // ===== NOTIFICATION SOUND =====
        function playNotificationSound() {
            // Simple beep using Web Audio API
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = 800;
                oscillator.type = 'sine';

                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);
            } catch (e) {
                // Audio not supported, ignore
            }
        }

        // ===== INITIALIZE =====
        document.addEventListener('DOMContentLoaded', () => {
            // First load
            fetchSignals();

            // Auto-refresh every 10 seconds
            setInterval(fetchSignals, REFRESH_INTERVAL);

            console.log('🚀 V12.3 PRO Signal Feed initialized');
            console.log('📊 Refresh interval:', REFRESH_INTERVAL + 'ms');
            console.log('📡 Source:', SIGNALS_URL);
        });
    </script>
</body>
</html>
