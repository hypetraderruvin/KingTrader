<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V12.3 PRO - Telegram Signal Feed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a12 0%, #151525 50%, #0f1623 100%);
            min-height: 100vh;
            color: #fff;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Header */
        .header {
            background: linear-gradient(145deg, #1e1e3f 0%, #2d2d5a 100%);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .header-emoji {
            font-size: 36px;
            margin-bottom: 8px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .header-title {
            font-size: 20px;
            font-weight: 800;
            color: #ffd700;
            letter-spacing: 1px;
        }

        .header-pair {
            font-size: 24px;
            color: #64b5f6;
            font-weight: 900;
            margin: 8px 0;
            font-family: 'Consolas', monospace;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            color: #00ff88;
            margin-top: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 12px #00ff88;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.8); }
        }

        /* Connection Info */
        .connection-info {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 16px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            border: 1px solid rgba(100, 100, 150, 0.2);
        }

        .connection-left {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8892b0;
        }

        .connection-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .api-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 600;
        }

        .api-connected {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .api-disconnected {
            background: rgba(255, 71, 87, 0.2);
            color: #ff4757;
        }

        .last-update {
            color: #ffd700;
            font-weight: 600;
        }

        /* Signal Cards */
        .signal-feed {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .signal-card {
            background: linear-gradient(145deg, #1a1a35 0%, #252550 100%);
            border-radius: 16px;
            border: 1px solid rgba(100, 100, 150, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideIn 0.4s ease-out;
            transition: transform 0.2s ease;
        }

        .signal-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.2);
        }

        .card-emoji {
            font-size: 22px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.5px;
            flex: 1;
        }

        .card-time {
            font-size: 11px;
            color: #8892b0;
            font-family: 'Consolas', monospace;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, rgba(100, 100, 150, 0.6) 15%, rgba(100, 100, 150, 0.6) 85%, transparent 100%);
            margin: 0 18px;
        }

        .card-body {
            padding: 14px 18px;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Signal Type Colors */
        .signal-new { border-left: 3px solid #ffd700; }
        .signal-entry { border-left: 3px solid #00ff88; }
        .signal-win { border-left: 3px solid #00ff88; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
        .signal-loss { border-left: 3px solid #ff4757; box-shadow: 0 0 20px rgba(255, 71, 87, 0.2); }
        .signal-refund { border-left: 3px solid #ffd700; }
        .signal-martingale { border-left: 3px solid #ff6b6b; border: 2px solid rgba(255, 107, 107, 0.3); }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
            color: #8892b0;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 215, 0, 0.3);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8892b0;
        }

        .refresh-btn {
            background: linear-gradient(145deg, #2d2d5a 0%, #1e1e3f 100%);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #ffd700;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: linear-gradient(145deg, #3d3d7a 0%, #2e2e5f 100%);
            transform: translateY(-1px);
        }

        /* Manual Input Section */
        .manual-section {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(100, 100, 150, 0.2);
        }

        .manual-title {
            font-size: 12px;
            color: #8892b0;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .paste-area {
            width: 100%;
            min-height: 100px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(100, 100, 150, 0.3);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            resize: vertical;
            margin-bottom: 10px;
        }

        .paste-area:focus {
            outline: none;
            border-color: #ffd700;
        }

        .add-btn {
            width: 100%;
            background: linear-gradient(145deg, #ffd700 0%, #ffaa00 100%);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a12;
        }

        ::-webkit-scrollbar-thumb {
            background: #2d2d5a;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Header -->
        <div class="header">
            <div class="header-emoji">🚀</div>
            <div class="header-title">V12.3 PRO SIGNAL FEED</div>
            <div class="header-pair" id="currentPair">EUR/USD</div>
            <div class="status-bar">
                <span class="status-dot"></span>
                <span>LIVE TELEGRAM FEED</span>
            </div>
        </div>

        <!-- Connection Info -->
        <div class="connection-info">
            <div class="connection-left">
                <span>📡</span>
                <span>Telegram Channel</span>
            </div>
            <div class="connection-right">
                <span class="api-status api-connected" id="apiStatus">● Connected</span>
                <span class="last-update" id="lastUpdate">--:--</span>
            </div>
        </div>

        <!-- Manual Paste Area (Fallback) -->
        <div class="manual-section" id="manualSection">
            <div class="manual-title">📋 Paste Telegram Signal (Manual)</div>
            <textarea class="paste-area" id="pasteArea" placeholder="Paste your Telegram signal message here...

Example:
🎯 NEW SIGNAL DETECTED
━━━━━━━━━━━━━━━━━━━━
⬆️ CALL | EUR/USD
🔥 Confidence: 85%
━━━━━━━━━━━━━━━━━━━━
🕐 Entry: 17:45 IST
Countdown: 45 seconds"></textarea>
            <button class="add-btn" onclick="addManualSignal()">➕ ADD TO DASHBOARD</button>
        </div>

        <!-- Signal Feed -->
        <div class="signal-feed" id="signalFeed">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>Connecting to Telegram feed...</div>
            </div>
        </div>

    </div>

    <script>
        // ===== CONFIGURATION =====
        // Option 1: GitHub JSON URL (if using Python bridge)
        const GITHUB_JSON_URL = 'https://raw.githubusercontent.com/hypetraderruvin/KingTrader/main/signals.json';

        // Option 2: Direct Telegram polling (CORS proxy needed)
        const BOT_TOKEN = '8543942747:AAEWZ8SO11ndikTB9drYgsnf17igNhFmp9w';
        const CHANNEL_ID = '-1003702645985';

        // Use GitHub method by default (more reliable)
        const USE_GITHUB_METHOD = true;

        // ===== STATE =====
        let signals = [];
        let lastUpdateId = 0;

        // ===== PARSE TELEGRAM MESSAGE =====
        function parseTelegramMessage(text) {
            if (!text) return null;

            const lines = text.split('\n');
            const firstLine = lines[0] || '';

            // Detect signal type
            let type = 'signal-new';
            let title = '📊 SIGNAL';
            let emoji = '📊';

            if (firstLine.includes('🎯 NEW SIGNAL')) {
                type = 'signal-new';
                title = '🎯 NEW SIGNAL DETECTED';
                emoji = '🎯';
            } else if (firstLine.includes('🚀 ENTRY')) {
                type = 'signal-entry';
                title = '🚀 ENTRY EXECUTED';
                emoji = '🚀';
            } else if (firstLine.includes('✅ RESULT') || text.includes('PROFIT')) {
                type = 'signal-win';
                title = '✅ RESULT - WIN';
                emoji = '✅';
            } else if (firstLine.includes('❌ RESULT') || text.includes('LOSS')) {
                type = 'signal-loss';
                title = '❌ RESULT - LOSS';
                emoji = '❌';
            } else if (firstLine.includes('🔄 RESULT') || text.includes('REFUND')) {
                type = 'signal-refund';
                title = '🔄 RESULT - REFUND';
                emoji = '🔄';
            } else if (firstLine.includes('⚠️ MARTINGALE')) {
                type = 'signal-martingale';
                title = '⚠️ MARTINGALE ACTIVATED';
                emoji = '⚠️';
            }

            // Extract pair
            let pair = 'EUR/USD';
            const pairMatch = text.match(/([A-Z]{3}\/[A-Z]{3})/);
            if (pairMatch) pair = pairMatch[1];

            // Extract confidence
            let confidence = '';
            const confMatch = text.match(/Confidence:\s*(\d+)%/);
            if (confMatch) confidence = confMatch[1] + '%';

            // Extract time
            let time = '';
            const timeMatch = text.match(/(\d{2}:\d{2})/);
            if (timeMatch) time = timeMatch[1];

            return {
                type,
                title,
                emoji,
                pair,
                confidence,
                time,
                text,
                timestamp: new Date().toISOString()
            };
        }

        // ===== RENDER SIGNAL CARD =====
        function renderSignalCard(signal) {
            const card = document.createElement('div');
            card.className = `signal-card ${signal.type}`;

            const time = signal.time || new Date().toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: false 
            }) + ' IST';

            card.innerHTML = `
                <div class="card-header">
                    <span class="card-emoji">${signal.emoji}</span>
                    <span class="card-title">${signal.title}</span>
                    <span class="card-time">${time}</span>
                </div>
                <div class="divider"></div>
                <div class="card-body">${escapeHtml(signal.text)}</div>
            `;

            return card;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== FETCH FROM GITHUB =====
        async function fetchFromGitHub() {
            try {
                // Add cache-buster to get fresh data
                const url = GITHUB_JSON_URL + '?t=' + Date.now();
                const response = await fetch(url);

                if (!response.ok) throw new Error('Failed to fetch');

                const data = await response.json();

                if (data.signals && data.signals.length > 0) {
                    // Clear loading
                    document.getElementById('signalFeed').innerHTML = '';

                    // Display signals (newest first)
                    data.signals.slice().reverse().forEach(signal => {
                        const parsed = parseTelegramMessage(signal.text);
                        if (parsed) {
                            const card = renderSignalCard(parsed);
                            document.getElementById('signalFeed').appendChild(card);
                        }
                    });

                    // Update status
                    document.getElementById('apiStatus').textContent = '● Connected';
                    document.getElementById('apiStatus').className = 'api-status api-connected';
                    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();

                    // Update pair display
                    if (data.signals[0]) {
                        const pairMatch = data.signals[0].text.match(/([A-Z]{3}\/[A-Z]{3})/);
                        if (pairMatch) {
                            document.getElementById('currentPair').textContent = pairMatch[1];
                        }
                    }
                } else {
                    showEmptyState();
                }
            } catch (error) {
                console.error('GitHub fetch error:', error);
                document.getElementById('apiStatus').textContent = '● Using Manual Mode';
                document.getElementById('apiStatus').className = 'api-status api-disconnected';
                showEmptyState();
            }
        }

        // ===== SHOW EMPTY STATE =====
        function showEmptyState() {
            document.getElementById('signalFeed').innerHTML = `
                <div class="empty-state">
                    <div style="font-size: 40px; margin-bottom: 15px;">📭</div>
                    <div>No signals yet</div>
                    <div style="font-size: 12px; margin-top: 10px; opacity: 0.7;">
                        Paste a Telegram signal below to display it
                    </div>
                </div>
            `;
        }

        // ===== MANUAL ADD =====
        function addManualSignal() {
            const text = document.getElementById('pasteArea').value.trim();
            if (!text) return;

            const parsed = parseTelegramMessage(text);
            if (parsed) {
                // Clear empty state if exists
                const feed = document.getElementById('signalFeed');
                if (feed.querySelector('.empty-state') || feed.querySelector('.loading')) {
                    feed.innerHTML = '';
                }

                // Add to top
                const card = renderSignalCard(parsed);
                feed.insertBefore(card, feed.firstChild);

                // Clear textarea
                document.getElementById('pasteArea').value = '';

                // Update pair
                document.getElementById('currentPair').textContent = parsed.pair;
            }
        }

        // ===== AUTO REFRESH =====
        function startAutoRefresh() {
            if (USE_GITHUB_METHOD) {
                // Refresh every 10 seconds from GitHub
                fetchFromGitHub();
                setInterval(fetchFromGitHub, 10000);
            }
        }

        // ===== INITIALIZE =====
        document.addEventListener('DOMContentLoaded', () => {
            startAutoRefresh();

            // Allow Ctrl+Enter to paste
            document.getElementById('pasteArea').addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') {
                    addManualSignal();
                }
            });
        });
    </script>
</body>
</html>
